name: FinTech Automation Pipeline

on:
  schedule:
    # 3:30 UTC = 9:00 AM IST
    - cron: '30 3 * * *'
    # 10:30 UTC = 4:00 PM IST
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows manual button click

jobs:
  run-fintech-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Safety limit

    steps:
      # --- 1. Setup ---
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up future runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # --- 2. Run Market Report (Technical Analysis) ---
      - name: Run Market Report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python market_report.py

      # --- 3. Run News Fetcher (RSS) ---
      # 'if: always()' ensures this runs even if Market Report fails
      - name: Run News Fetcher
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python fetch_rss_news.py

      # --- 4. (Future) Add AI Script Here ---
      # - name: Run AI Analysis
      #   if: always()
      #   env: ...
      #   run: python ai_analyst.py