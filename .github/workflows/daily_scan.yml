name: Market Close Judge

on:
  schedule:
    # CRON SYNTAX: "Minute Hour Day Month DayOfWeek"
    # GitHub uses UTC. 
    # 4:00 PM IST = 10:30 AM UTC
    - cron: '30 10 * * 1-5' # Runs Mon-Fri at 10:30 UTC (16:00 IST)
  workflow_dispatch: # Allows you to click "Run Now" manually for testing

jobs:
  update_stats:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: |
          pip install supabase yfinance pandas

      - name: Run The Judge
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python market_close_job.py