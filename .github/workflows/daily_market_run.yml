name: Daily Market Algo Run

on:
  schedule:
    # Runs at 10:05 UTC = 3:35 PM IST (Market Close + 5 mins)
    - cron: '5 10 * * *'
  workflow_dispatch: # Allows manual click to test

jobs:
  run-algo-system:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas yfinance pandas_ta supabase requests

      - name: 1. Update Market Data (Ingest)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python stockcal-engine/ingest_data.py
        # Note: Adjust path if ingest_data.py is in root or a folder

      - name: 2. Update Strategy Signals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python stockcal-engine/master_engine.py
        # Note: Adjust path if master_engine.py is in root

      - name: 3. Run Smart Bots (Forward Test)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python run_daily_bot.py