name: Daily Market Algo Run

on:
  schedule:
    - cron: '5 10 * * *'
  workflow_dispatch:

jobs:
  run-algo-system:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Use Standard Python 3.9 (Safe for Finance)
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          
          # NO pandas_ta NEEDED ANYMORE!
          # Just install standard libraries that always work.
          pip install pandas yfinance supabase requests

      - name: 1. Update Market Data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python ingest_data.py

      # Skipping Master Engine for now to focus on the Bot
      # - name: 2. Update Strategy Signals
      #   env: ...
      #   run: python master_engine.py

      - name: 3. Run Smart Bots
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python run_daily_bot.py