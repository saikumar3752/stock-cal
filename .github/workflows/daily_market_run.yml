name: Daily Market Algo Run

on:
  schedule:
    # Runs at 10:05 UTC = 3:35 PM IST
    - cron: '5 10 * * *'
  workflow_dispatch: # Allows manual run

jobs:
  run-algo-system:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: Install Dependencies (Fixed)
        run: |
          python -m pip install --upgrade pip
          # Install pandas_ta from the dev branch to fix version errors
          pip install git+https://github.com/twopirllc/pandas-ta.git@development
          pip install pandas yfinance supabase requests numpy==1.26.4

      - name: 1. Update Market Data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python ingest_data.py

      - name: 2. Update Strategy Signals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python master_engine.py

      - name: 3. Run Smart Bots
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python run_daily_bot.py