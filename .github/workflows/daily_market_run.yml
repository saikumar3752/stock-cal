name: Daily Market Algo Run

on:
  schedule:
    - cron: '5 10 * * *'
  workflow_dispatch:

jobs:
  run-algo-system:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies (Fixed)
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2.0.0"
          # FIX: Download ZIP directly (Bypasses the 'Username' error)
          pip install https://github.com/twopirllc/pandas-ta/archive/development.zip
          pip install pandas yfinance supabase requests

      - name: 1. Update Market Data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python ingest_data.py

      - name: 2. Update Strategy Signals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python master_engine.py

      - name: 3. Run Smart Bots
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python run_daily_bot.py